name: Update Popular Posts

on:
  schedule:
    - cron: '30 0 * * *'  # 매일 09:30 KST (00:30 UTC)
  push:
    branches:
      - master
    paths:
      - ".github/workflows/ga4-popular-posts.yml"
      - "src/services/GoogleAnalyticsService.mjs"
      - "src/services/PopularPostsService.mjs"
  workflow_dispatch:

jobs:
  update-popular-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create Google service account config
        run: |
          mkdir -p config
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > config/google_service_account.json

      - name: Run GA4 export
        run: npm run ga4:export

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/popular/
          if git diff --staged --quiet; then
            echo "변경 사항 없음, 커밋 건너뜀"
          else
            git commit -m "chore(data): GA4 인기글 데이터 업데이트"
            git push
          fi
